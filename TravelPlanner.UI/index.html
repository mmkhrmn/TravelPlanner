<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seyahat Planlayıcı</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E✈️%3C/text%3E%3C/svg%3E">
  <style>
    body { background: #f7f9fc; }
    .hero { padding: 4rem 1rem; text-align: center; }
    .card { border: 0; box-shadow: 0 6px 18px rgba(20,30,60,0.08); }
    .route-result { white-space: pre-wrap; }
  </style>
</head>
<body>
  <header class="hero">
    <div class="container">
      <h1 class="display-5 fw-bold">Seyahat Planlayıcı</h1>
      <p class="text-muted">Gezilecek yerleri planlayın ve keşfedin.</p>
    </div>
  </header>

  <main class="container mb-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card p-4">
          <div class="mb-3">
            <label for="countrySelect" class="form-label">Ülke Seçiniz</label>
            <select id="countrySelect" class="form-select">
              <option value="">-- Ülke seçin --</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="citySelect" class="form-label">Şehir Seçiniz</label>
            <select id="citySelect" class="form-select" disabled>
              <option value="">-- Önce Şehir seçin --</option>
            </select>
          </div>

          <div class="text-end">
            <small class="text-muted">Veriler API'den çekilmektedir.</small>
          </div>
          <div class="row g-3 mt-3">
            <div class="col-md-6">
              <label for="wakeUpTime" class="form-label">Güne Başlama Saati</label>
              <input id="wakeUpTime" type="time" class="form-control" />
            </div>
            <div class="col-md-12">
              <label for="travelNotes" class="form-label">Özel İstekler / Notlar</label>
              <textarea id="travelNotes" class="form-control" rows="3" placeholder="Özel isteklerinizi veya notlarınızı yazın..."></textarea>
            </div>
          </div>

          <div class="d-flex justify-content-end mt-3">
            <button id="btnCreateRoute" class="btn btn-primary">Rota Oluştur</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div class="container mb-5">
    <div id="routeResult" class="card p-3 d-none">
      <h5 class="mb-2">Oluşturulan Rota</h5>
      <div id="routeResultContent" class="route-result text-dark"></div>
    </div>
  </div>

  <script>
    // Base URL of the API
    const apiBase = 'http://localhost:5146';

    // Elements
    const countrySelect = document.getElementById('countrySelect');
    const citySelect = document.getElementById('citySelect');

    // Fetch countries on load and populate the countrySelect
    document.addEventListener('DOMContentLoaded', async () => {
      try {
        const res = await fetch(`${apiBase}/api/countries`);
        if (!res.ok) throw new Error('Ağ hatası: ' + res.status);
        const data = await res.json();

        // The API may return either a plain array or an object with a 'value' wrapper
        const countries = Array.isArray(data) ? data : (data.value ?? []);

        console.log('Fetched countries:', countries);

        countries.forEach(c => {
          const opt = document.createElement('option');
          // ensure value is a string and guard null/undefined
          opt.value = String(c.id ?? '');
          opt.textContent = c.name ?? '(isim yok)';
          countrySelect.appendChild(opt);
        });
      } catch (err) {
        console.error('Ülkeler yüklenirken hata:', err);
        const errOpt = document.createElement('option');
        errOpt.value = '';
        errOpt.textContent = 'Ülkeler yüklenemedi';
        countrySelect.appendChild(errOpt);
      }
    });

    // When a country is selected, log the selected ID (later: fetch cities)
    countrySelect.addEventListener('change', (e) => {
      // Prefer reading from the select element directly
      const selectedId = countrySelect.value;
      const selectedIndex = countrySelect.selectedIndex;
      const selectedOption = countrySelect.options[selectedIndex];
      console.log('Seçilen ülke ID:', selectedId);
      console.log('Selected index:', selectedIndex);
      console.log('Selected option element:', selectedOption);
      console.log('All options snapshot:', Array.from(countrySelect.options).map(o => ({ value: o.value, text: o.text })));

      // Enable city select and fetch cities for selected country
      citySelect.disabled = !selectedId;
      citySelect.innerHTML = '<option value="">-- Şehir seçin --</option>';

      if (selectedId) {
        fetch(`${apiBase}/api/cities?countryId=${encodeURIComponent(selectedId)}`)
          .then(r => {
            if (!r.ok) throw new Error('Ağ hatası: ' + r.status);
            return r.json();
          })
          .then(cities => {
            console.log('Fetched cities:', cities);
            // clear existing except placeholder
            citySelect.innerHTML = '<option value="">-- Şehir seçin --</option>';
            (Array.isArray(cities) ? cities : (cities.value ?? [])).forEach(city => {
              const o = document.createElement('option');
              o.value = String(city.id ?? '');
              o.textContent = city.name ?? '(isim yok)';
              citySelect.appendChild(o);
            });
          })
          .catch(err => {
            console.error('Şehirler yüklenirken hata:', err);
          });
      }
    });

    /*
      CORS Notu:
      Eğer tarayıcıdan API'ye erişirken CORS (Cross-Origin) hatası alırsanız,
      TravelPlanner.API/Program.cs içinde şu adımları uygulayabilirsiniz:

      1) Hizmetleri kaydederken (builder kısmı):
         builder.Services.AddCors(options =>
         {
           options.AddDefaultPolicy(policy =>
             policy.AllowAnyOrigin().AllowAnyMethod().AllowAnyHeader());
         });

      2) Middleware sırasına ekleyin (app oluşturulduktan sonra, MapOpenApi'den önce veya hemen sonra):
         app.UseCors();

      Not: Geliştirme ortamında basitçe AllowAnyOrigin kullanabilirsiniz, üretimde güvenli bir origin listesi tanımlayın.
    */
    // New route creation elements
    const wakeUpTime = document.getElementById('wakeUpTime');
    const travelNotes = document.getElementById('travelNotes');
    const btnCreateRoute = document.getElementById('btnCreateRoute');

    const routeResult = document.getElementById('routeResult');
    const routeResultContent = document.getElementById('routeResultContent');

    btnCreateRoute.addEventListener('click', async () => {
      const countryName = countrySelect.options[countrySelect.selectedIndex]?.text || '';
      const cityName = citySelect.options[citySelect.selectedIndex]?.text || '';
      const wake = wakeUpTime.value || '';
      const notes = travelNotes.value || '';

      const payload = {
        CountryName: countryName,
        CityName: cityName,
        WakeUpTime: wake,
        UserNotes: notes
      };

      try {
        const res = await fetch(`${apiBase}/api/route/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        // Show raw status on error
        if (!res.ok) {
          const txt = await res.text();
          routeResultContent.textContent = `Sunucu hatası: ${res.status}\n${txt}`;
          routeResult.classList.remove('d-none');
          return;
        }

        const result = await res.json();
        console.log('Route generate result:', result);

        const msg = result.Message ?? result.message ?? '';
        const draft = result.DraftRoute ?? result.draftRoute ?? '';
        routeResultContent.textContent = msg + '\n\n' + draft;
        routeResult.classList.remove('d-none');
        routeResult.scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        console.error('Rota oluşturma hatası:', err);
        routeResultContent.textContent = 'Rota oluşturulurken hata: ' + (err.message || err);
        routeResult.classList.remove('d-none');
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
